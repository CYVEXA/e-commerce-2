{% extends 'base.html' %}

{% block title %}Login - ShopEase{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 2rem auto;
    }

    .auth-card {
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    }

    .auth-header {
        background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
        color: white;
        padding: 2rem;
        text-align: center;
    }

    .auth-header h2 {
        margin: 0;
        font-weight: 700;
    }

    .auth-body {
        padding: 2rem;
        background: white;
    }

    .form-control {
        border-radius: 15px;
        padding: 0.75rem 1rem;
        border: 2px solid #e0e0e0;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.2rem rgba(255, 107, 53, 0.25);
    }

    .form-label {
        font-weight: 600;
        color: var(--dark);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-box-arrow-in-right" style="font-size: 3rem;"></i>
            <h2 class="mt-2">Welcome Back</h2>
            <p class="mb-0">Login to your account</p>
        </div>
        
        <div class="auth-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="bi bi-check-circle"></i> Login
                </button>
                
                <div class="text-center">
                    <p class="mb-0">Don't have an account? 
                        <a href="{% url 'signup' %}" class="text-decoration-none fw-bold" style="color: var(--primary-color);">
                            Sign Up
                        </a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
